<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Simly</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap');
:root{
  --bg:#070714;--surface:#0d0d2b;--surface2:#12123a;--border:#2a2a6e;
  --pink:#ff2d78;--purple:#b44fff;--cyan:#00f5ff;
  --text:#e8e8ff;--muted:#4a4a8a;--muted2:#7a7aaa;
  --grid:rgba(180,79,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 80px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:40%;background:linear-gradient(to top,rgba(180,79,255,0.06),transparent);pointer-events:none;z-index:0;}
.container{position:relative;z-index:1;width:100%;max-width:680px;}
.app-header{text-align:center;margin-bottom:24px;padding-top:8px;}
.logo{font-family:'Orbitron',monospace;font-size:clamp(32px,10vw,52px);font-weight:900;letter-spacing:0.15em;line-height:1;color:var(--cyan);text-shadow:0 0 20px rgba(0,245,255,0.6),0 0 60px rgba(0,245,255,0.2);margin-bottom:6px;}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.5vw,10px);letter-spacing:0.3em;text-transform:uppercase;color:var(--purple);text-shadow:0 0 10px rgba(180,79,255,0.5);}
.progress-wrap{margin-bottom:20px;}
.progress-track{display:flex;gap:4px;margin-bottom:6px;}
.prog-step{flex:1;height:4px;background:var(--surface2);border-radius:0;transition:background 0.3s;position:relative;overflow:hidden;border:1px solid var(--border);}
.prog-step.done{background:var(--purple);border-color:var(--purple);}
.prog-step.active{background:var(--pink);border-color:var(--pink);}
.prog-step.active::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);animation:shimmer 1s infinite;}
.progress-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--purple);text-align:center;}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:0;overflow:hidden;animation:fadeUp 0.3s ease both;box-shadow:0 0 30px rgba(180,79,255,0.08);position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--cyan),var(--purple),transparent);}
.card-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2);}
.badge{font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.15em;padding:4px 10px;background:rgba(255,45,120,0.1);border:1px solid var(--pink);color:var(--pink);border-radius:0;text-transform:uppercase;}
.badge.cyan{background:rgba(0,245,255,0.08);border-color:var(--cyan);color:var(--cyan);}
.badge.purple{background:rgba(180,79,255,0.1);border-color:var(--purple);color:var(--purple);}
.card-title{font-family:'Orbitron',monospace;font-size:clamp(14px,4vw,18px);font-weight:700;letter-spacing:0.08em;color:var(--text);}
.card-body{padding:20px;}
.step-title{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(22px,6vw,30px);letter-spacing:0.06em;color:var(--cyan);line-height:1.1;margin-bottom:12px;text-shadow:0 0 20px rgba(0,245,255,0.4);}
.step-explain{background:rgba(180,79,255,0.06);border-left:3px solid var(--purple);padding:12px 16px;margin-bottom:18px;}
.step-explain p{font-size:clamp(12px,3.5vw,13px);line-height:1.75;color:var(--muted2);}
.step-ex{margin-top:8px;font-style:italic;font-size:clamp(11px,3.2vw,12px);color:var(--muted);border-top:1px solid var(--border);padding-top:8px;}
.ex-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--purple);display:block;margin-bottom:3px;}
.input-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;display:block;}
textarea{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:clamp(14px,4vw,15px);line-height:1.7;padding:14px;resize:none;outline:none;transition:border-color 0.2s,box-shadow 0.2s;min-height:clamp(100px,25vw,130px);border-radius:0;}
textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,245,255,0.15);}
textarea::placeholder{color:var(--muted);font-style:italic;}
.btn-row{display:grid;gap:10px;margin-top:16px;}
.btn-row.two{grid-template-columns:1fr 2fr;}
.btn-row.one{grid-template-columns:1fr;}
.btn{font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,11px);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:16px 20px;border:1px solid;border-radius:0;cursor:pointer;transition:all 0.15s;min-height:52px;touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:6px;width:100%;}
.btn-next{background:rgba(255,45,120,0.12);color:var(--pink);border-color:var(--pink);}
.btn-next:active{background:rgba(255,45,120,0.25);}
.btn-purple{background:rgba(180,79,255,0.12);color:var(--purple);border-color:var(--purple);}
.btn-purple:active{background:rgba(180,79,255,0.25);}
.btn-cyan{background:rgba(0,245,255,0.08);color:var(--cyan);border-color:var(--cyan);}
.btn-cyan:active{background:rgba(0,245,255,0.2);}
.btn-back{background:transparent;color:var(--muted2);border-color:var(--border);}
.btn-ghost{background:transparent;color:var(--muted2);border-color:var(--border);}
@media(hover:hover){
  .btn-next:hover{background:rgba(255,45,120,0.2);}
  .btn-purple:hover{background:rgba(180,79,255,0.2);}
  .btn-cyan:hover{background:rgba(0,245,255,0.15);}
  .btn-back:hover,.btn-ghost:hover{border-color:var(--muted2);color:var(--text);}
}
.outcome-box{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.3);padding:16px;margin-bottom:16px;}
.outcome-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;}
.outcome-text{font-size:clamp(14px,4vw,15px);color:var(--text);line-height:1.7;font-style:italic;}
.outcome-attempt{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);margin-top:6px;}
.route-choice{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.route-btn{background:var(--surface2);border:2px solid var(--border);padding:18px 20px;cursor:pointer;text-align:left;transition:all 0.15s;touch-action:manipulation;width:100%;display:flex;gap:16px;align-items:flex-start;}
.route-btn.fast{border-color:rgba(0,245,255,0.3);}
.route-btn.story{border-color:rgba(180,79,255,0.3);}
.route-btn:active{transform:scale(0.98);}
@media(hover:hover){
  .route-btn.fast:hover{border-color:var(--cyan);background:rgba(0,245,255,0.06);transform:translateX(3px);}
  .route-btn.story:hover{border-color:var(--purple);background:rgba(180,79,255,0.08);transform:translateX(3px);}
}
.route-icon{font-size:24px;flex-shrink:0;margin-top:2px;}
.route-title{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(13px,3.5vw,15px);letter-spacing:0.06em;margin-bottom:4px;}
.route-btn.fast .route-title{color:var(--cyan);}
.route-btn.story .route-title{color:var(--purple);}
.route-desc{font-size:clamp(11px,3.2vw,12px);color:var(--muted2);line-height:1.5;}
.route-time{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;margin-top:6px;}
.route-btn.fast .route-time{color:rgba(0,245,255,0.5);}
.route-btn.story .route-time{color:rgba(180,79,255,0.5);}
.chap-strip{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.chap-dots{display:flex;gap:6px;}
.chap-dot{width:10px;height:10px;background:var(--surface2);border:1px solid var(--border);transition:all 0.3s;}
.chap-dot.done{background:var(--purple);border-color:var(--purple);box-shadow:0 0 8px rgba(180,79,255,0.5);}
.chap-dot.active{background:var(--pink);border-color:var(--pink);box-shadow:0 0 12px rgba(255,45,120,0.7);}
.chap-label{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;letter-spacing:0.08em;color:var(--muted2);}
.rpg-scene{background:rgba(0,0,0,0.5);border:1px solid var(--border);padding:18px;margin-bottom:16px;position:relative;}
.rpg-scene::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent);}
.rpg-scene p{font-size:clamp(14px,4vw,15px);line-height:1.9;color:var(--text);margin-bottom:10px;}
.rpg-scene p:last-child{margin-bottom:0;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.choice{background:rgba(180,79,255,0.06);border:1px solid var(--border);padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:clamp(13px,4vw,14px);line-height:1.5;cursor:pointer;text-align:left;transition:all 0.15s;display:flex;gap:10px;align-items:center;min-height:52px;touch-action:manipulation;width:100%;}
.choice:active{border-color:var(--purple);background:rgba(180,79,255,0.15);}
.cletter{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;color:var(--purple);background:rgba(180,79,255,0.15);border:1px solid rgba(180,79,255,0.3);padding:3px 8px;flex-shrink:0;}
@media(hover:hover){.choice:hover{border-color:var(--purple);background:rgba(180,79,255,0.1);transform:translateX(3px);}}
.verdict-screen{text-align:center;padding:32px 16px 24px;animation:fadeUp 0.5s ease both;}
.verdict-pre{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted2);margin-bottom:14px;}
.verdict-word{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(40px,12vw,64px);letter-spacing:0.04em;line-height:1.05;margin-bottom:14px;animation:verdictPop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;}
.verdict-word.funded{color:var(--cyan);text-shadow:0 0 30px rgba(0,245,255,0.6);}
.verdict-word.drawing{color:var(--pink);text-shadow:0 0 30px rgba(255,45,120,0.6);}
.verdict-score{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,3vw,12px);letter-spacing:0.15em;color:var(--muted2);margin-bottom:6px;}
.verdict-msg{font-size:clamp(13px,3.8vw,14px);color:var(--muted2);line-height:1.7;margin-bottom:20px;font-style:italic;}
@keyframes verdictPop{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}
.dashboard{background:var(--surface);border:1px solid var(--border);margin-top:16px;position:relative;overflow:hidden;}
.dashboard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),var(--pink),transparent);}
.dash-header{background:linear-gradient(135deg,rgba(180,79,255,0.2),rgba(0,245,255,0.1));padding:20px;border-bottom:1px solid var(--border);}
.dash-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.dash-logo{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.25em;color:rgba(0,245,255,0.6);font-weight:700;}
.dash-score{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;color:var(--cyan);line-height:1;text-shadow:0 0 20px rgba(0,245,255,0.4);}
.dash-score span{font-size:14px;opacity:0.7;margin-left:2px;}
.dash-idea{font-family:'Orbitron',monospace;font-size:clamp(16px,4.5vw,20px);font-weight:700;color:var(--text);line-height:1.1;margin-bottom:4px;}
.dash-score-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(0,245,255,0.6);}
.dash-body{padding:16px 20px;}
.dash-sec{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.dash-sec:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.dash-sec-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--pink);margin-bottom:8px;}
.dash-tags{display:flex;flex-wrap:wrap;gap:6px;}
.dash-tag{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.08em;padding:4px 10px;background:rgba(0,245,255,0.06);border:1px solid rgba(0,245,255,0.2);color:var(--cyan);}
.dash-item{background:rgba(0,0,0,0.3);border:1px solid var(--border);padding:10px 14px;margin-bottom:6px;}
.dash-item:last-child{margin-bottom:0;}
.dash-item-main{font-size:clamp(12px,3.5vw,13px);color:var(--text);line-height:1.5;margin-bottom:3px;}
.dash-item-sub{font-size:clamp(11px,3.2vw,12px);font-style:italic;line-height:1.5;}
.mit{color:var(--cyan);}
.sol{color:var(--purple);}
.market-box{background:rgba(180,79,255,0.06);border:1px solid rgba(180,79,255,0.2);padding:12px 14px;font-size:clamp(12px,3.5vw,13px);color:var(--text);line-height:1.6;}
.disclaimer{padding:12px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2);}
.disclaimer p{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.08em;line-height:1.8;color:var(--muted);text-align:center;}
.share-area{padding:16px 20px;border-top:1px solid var(--border);}
.share-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center;}
.share-btns{display:flex;gap:8px;}
.btn-wa{flex:2;font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,11px);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:16px 20px;background:rgba(37,211,102,0.1);border:1px solid #25d366;color:#25d366;cursor:pointer;transition:all 0.15s;touch-action:manipulation;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-copy{flex:1;font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.2vw,9px);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:16px 10px;background:transparent;border:1px solid var(--border);color:var(--muted2);cursor:pointer;transition:all 0.15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.share-copied{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--cyan);text-align:center;margin-top:8px;animation:fadeUp 0.3s ease both;}
.streak{display:inline-flex;align-items:center;gap:6px;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--purple);background:rgba(180,79,255,0.1);border:1px solid rgba(180,79,255,0.3);padding:4px 12px;margin-bottom:14px;}
.loading{display:flex;align-items:center;gap:12px;padding:28px 0;font-family:'Share Tech Mono',monospace;font-size:clamp(9px,2.5vw,10px);letter-spacing:0.15em;text-transform:uppercase;color:var(--purple);}
.ldots{display:flex;gap:5px;}
.ldots span{width:7px;height:7px;animation:bounce 1.2s infinite;}
.ldots span:nth-child(1){background:var(--pink);}
.ldots span:nth-child(2){background:var(--purple);animation-delay:0.2s;}
.ldots span:nth-child(3){background:var(--cyan);animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.3}40%{transform:translateY(-7px);opacity:1}}
.restart{text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.dash-footer{padding:10px 20px;border-top:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);text-align:center;}
.intro-screen{text-align:center;padding:8px 0;}
.intro-logo{font-family:'Orbitron',monospace;font-size:clamp(48px,16vw,80px);font-weight:900;letter-spacing:0.15em;line-height:1;color:var(--cyan);text-shadow:0 0 30px rgba(0,245,255,0.7),0 0 80px rgba(0,245,255,0.3);margin-bottom:8px;}
.intro-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,2.5vw,10px);letter-spacing:0.3em;text-transform:uppercase;color:var(--purple);text-shadow:0 0 10px rgba(180,79,255,0.5);margin-bottom:28px;}
.lang-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
.lang-btn{font-family:'Orbitron',monospace;font-weight:900;font-size:13px;letter-spacing:0.15em;padding:8px 20px;border:2px solid;cursor:pointer;transition:all 0.2s;background:transparent;}
.lang-btn.active-pt{color:var(--pink);border-color:var(--pink);}
.lang-btn.active-en{color:var(--cyan);border-color:var(--cyan);}
.lang-btn.inactive{color:var(--muted);border-color:var(--border);}
.mode-selector{display:flex;gap:8px;margin-bottom:20px;}
.intro-tagline{font-size:clamp(15px,4.5vw,20px);color:var(--text);line-height:1.6;margin-bottom:12px;font-style:italic;}
.intro-tagline em{color:var(--pink);font-style:normal;font-family:'Orbitron',monospace;font-weight:700;font-size:0.9em;}
.intro-desc{font-size:clamp(12px,3.5vw,14px);color:var(--muted2);line-height:1.8;margin-bottom:28px;max-width:480px;margin-left:auto;margin-right:auto;}
.intro-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;text-align:left;}
.intro-step{display:flex;align-items:flex-start;gap:14px;background:rgba(180,79,255,0.06);border:1px solid rgba(180,79,255,0.15);padding:12px 16px;}
.intro-step-num{font-family:'Orbitron',monospace;font-weight:900;font-size:22px;color:var(--purple);line-height:1;flex-shrink:0;min-width:28px;}
.intro-step-text strong{display:block;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--cyan);margin-bottom:3px;}
.intro-step-text span{font-size:clamp(12px,3.2vw,13px);color:var(--muted2);line-height:1.5;}
.intro-note{background:rgba(0,245,255,0.04);border:1px solid rgba(0,245,255,0.15);padding:12px 16px;margin-bottom:20px;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.1em;line-height:1.7;color:rgba(0,245,255,0.6);text-align:center;}
.intro-divider{height:1px;background:linear-gradient(90deg,transparent,var(--purple),var(--cyan),var(--purple),transparent);margin:0 0 20px;}
.intro-cta{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.btn-start{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(12px,3.5vw,16px);letter-spacing:0.15em;text-transform:uppercase;padding:20px 40px;background:rgba(0,245,255,0.08);border:2px solid var(--cyan);color:var(--cyan);cursor:pointer;transition:all 0.2s;touch-action:manipulation;width:100%;text-shadow:0 0 12px rgba(0,245,255,0.5);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,245,255,0.1);}50%{box-shadow:0 0 40px rgba(0,245,255,0.25);}}
@media(hover:hover){.btn-start:hover{background:rgba(0,245,255,0.15);animation:none;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:380px){.btn-row.two{grid-template-columns:1fr;}.share-btns{flex-wrap:wrap;}}
/* Paywall */
#paywallOverlay{position:fixed;inset:0;z-index:998;display:none;align-items:flex-end;justify-content:center;background:rgba(7,7,20,0.85);backdrop-filter:blur(6px);}
#paywallOverlay.show{display:flex;}
#paywallModal{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--cyan);width:100%;max-width:480px;padding:24px 20px 32px;position:relative;}
#paywallModal::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),var(--purple),transparent);}

// ── HELPERS ──
function t() { return TX[lang]; }
function isSolve() { return false; }

function prog(a) {
  for (var i = 0; i < 5; i++) {
    var e = document.getElementById('p' + i);
    e.className = 'prog-step';
    if (i < a) e.classList.add('done');
    else if (i === a) e.classList.add('active');
  }
  var phases = ['spark','objective','outcome','rpg','verdict','dashboard'];
  var idx = phases.indexOf(phase);
  var lbl = '';
  if (phase === 'rpg') lbl = 'CAP. ' + (chapNum+1) + ' / 4';
  else if (t().prog[phase]) lbl = t().prog[phase];
  document.getElementById('progLbl').textContent = lbl;
}

function hideUI(hide) {
  document.getElementById('appHeader').style.display = hide ? 'none' : 'block';
  document.getElementById('progressWrap').style.display = hide ? 'none' : 'block';
}

function render() {
  var a = document.getElementById('app');
  if (phase === 'intro') { hideUI(true); showIntro(a); return; }
  hideUI(false);
  var idx = ['spark','objective','outcome','rpg','verdict','dashboard'].indexOf(phase);
  prog(idx < 0 ? 0 : idx);
  if (phase === 'spark') showSpark(a);
  else if (phase === 'objective') showObjective(a);
  else if (phase === 'outcome') genOutcome(a);
  else if (phase === 'rpg') showRPG(a);
  else if (phase === 'verdict') showVerdict(a);
  else if (phase === 'dashboard') showDashboard(a);
}

function flash(el) {
  el.style.borderColor = 'var(--pink)';
  el.style.boxShadow = '0 0 0 2px rgba(255,45,120,0.2)';
  el.focus();
  setTimeout(function() { el.style.borderColor = ''; el.style.boxShadow = ''; }, 800);
}

function bind(id, key) {
  var el = document.getElementById(id);
  if (el) {
    el.addEventListener('input', function(e) { state[key] = e.target.value; });
    setTimeout(function() { el.focus(); }, 100);
  }
}

function go(id) {
  var el = document.getElementById(id);
  if (!el || !el.value.trim()) { if (el) flash(el); return false; }
  return true;
}

function loading(msg) {
  return '<div class="loading"><div class="ldots"><span></span><span></span><span></span></div><span id="lmsg">' + msg + '</span></div>';
}

function setLmsg(msg) {
  var el = document.getElementById('lmsg');
  if (el) el.textContent = msg;
}

async function genOutcome(a) {
  var tx = t();
  var loadMsg = attempt > 0 ? tx.genLoadingAlt : tx.genLoading;
  a.innerHTML = '<div class="card"><div class="card-body">' + loading(loadMsg) + '</div></div>';
  try {
    var altNote = attempt > 0 ? (lang === 'pt' ? 'Gere uma versao DIFERENTE e mais especifica.' : 'Generate a DIFFERENT and more specific version.') : '';
    var prompt;
    if (isSolve()) {
      prompt = lang === 'pt'
        ? 'Com base neste problema e necessidade, gere uma solucao potencial clara (1-2 frases).\n\nProblema: ' + state.spark + '\nNecessidade: ' + state.objective + '\n' + altNote + '\n\nJSON sem backticks:\n{"outcome":"solucao em 1-2 frases","title":"nome da solucao em 3-5 palavras"}'
        : 'Based on this problem and need, generate a clear potential solution (1-2 sentences).\n\nProblem: ' + state.spark + '\nNeed: ' + state.objective + '\n' + altNote + '\n\nJSON no backticks:\n{"outcome":"solution in 1-2 sentences","title":"solution name in 3-5 words"}';
    } else {
      prompt = lang === 'pt'
        ? 'Com base nesta ideia e objetivo, gere uma hipotese testavel (1-2 frases).\n\nSpark: ' + state.spark + '\nObjective: ' + state.objective + '\n' + altNote + '\n\nJSON sem backticks:\n{"outcome":"hipotese em 1-2 frases","title":"nome da ideia em 3-5 palavras"}'
        : 'Based on this idea and objective, generate a testable hypothesis (1-2 sentences).\n\nSpark: ' + state.spark + '\nObjective: ' + state.objective + '\n' + altNote + '\n\nJSON no backticks:\n{"outcome":"hypothesis in 1-2 sentences","title":"idea name in 3-5 words"}';
    }
    var res = await api(prompt, 200);
    state.outcome = res.outcome; state.title = res.title;
    var badge = tx.hypBadge;
    var hypLbl = tx.hypLabel;
    var simBtn = tx.simulate;
    var revBtn = tx.reviewObj;
    a.innerHTML = '<div class="card">'
      + '<div class="card-header"><span class="badge cyan">' + badge + '</span><span class="card-title">' + res.title + '</span></div>'
      + '<div class="card-body">'
      + '<div class="outcome-box"><div class="outcome-lbl">' + hypLbl + '</div>'
      + '<div class="outcome-text">"' + res.outcome + '"</div>'
      + (attempt > 0 ? '<div class="outcome-attempt">TENTATIVA ' + (attempt+1) + '</div>' : '')
      + '</div>'
      + '<div class="btn-row two">'
      + '<button class="btn btn-ghost" onclick="attempt++;phase=&apos;outcome&apos;;render()">&#8635; ' + tx.another + '</button>'
      + '<button class="btn btn-cyan" onclick="showRoute()">&gt; ' + simBtn + '</button>'
      + '</div>'
      + '<div style="margin-top:10px"><button class="btn btn-back" onclick="phase=&apos;objective&apos;;render()">&lt; ' + revBtn + '</button></div>'
      + '</div></div>';
  } catch(e) {
    errScreen(a, lang==='pt'?'ERRO AO GERAR.':'ERROR GENERATING.', function(){ genOutcome(a); }, function(){ phase='objective'; render(); });
  }
}

// ── RPG ──
async function showRPG(a) {
  var tx = t();
  var chaps = tx.chaps;
  var isFinal = chapNum >= 3;
  var dots = chaps.map(function(c, i) {
    var cls = i < chapNum ? 'done' : (i === chapNum ? 'active' : '');
    return '<div class="chap-dot ' + cls + '"></div>';
  }).join('');
  var pills = hist.length > 0 ? '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">'
    + hist.map(function(h, i) { return '<span style="font-family:Share Tech Mono,monospace;font-size:8px;color:var(--purple);background:rgba(180,79,255,0.1);border:1px solid rgba(180,79,255,0.2);padding:2px 8px">' + (i+1) + '. ' + h + '</span>'; }).join('')
    + '</div>' : '';

  a.innerHTML = '<div class="card"><div class="card-body">'
    + '<div class="chap-strip"><div class="chap-dots">' + dots + '</div><div class="chap-label">' + chaps[Math.min(chapNum,3)] + '</div></div>'
    + pills + loading('CAP. ' + (chapNum+1) + '...') + '</div></div>';

  try {
    var storyCtx = story.length > 0 ? (lang==='pt'?'Historia ate agora:':'Story so far:') + '\n' + story.join('\n---\n') : '';
    var histCtx = hist.length > 0 ? (lang==='pt'?'Escolhas:':'Choices:') + ' ' + hist.join(' > ') : '';
    var isFS = isFinal ? 'true' : 'false';
    var choicesStr = isFinal ? 'null' : '[{"letter":"A","text":"max 7 words"},{"letter":"B","text":"max 7 words"}]';
    var guide;
    if (isSolve()) {
      if (isFinal) guide = lang==='pt' ? 'DESFECHO: Mostre o resultado concreto apos aplicar a solucao. Resolveu? Parcialmente? 1 frase de veredicto.' : 'OUTCOME: Show the concrete result after applying the solution. Resolved? Partially? 1 verdict sentence.';
      else if (chapNum===0) guide = lang==='pt' ? 'ABERTURA: Solucao JA EXISTE. 1 pessoa com nome real que tem o problema comeca a usar a solucao. 2 frases. 1 decisao.' : 'OPENING: Solution ALREADY EXISTS. 1 person with real name who has the problem starts using it. 2 sentences. 1 decision.';
      else if (chapNum===1) guide = lang==='pt' ? 'CONFLITO: CONTINUE A HISTORIA. A pessoa usa a solucao e encontra resistencia real. 2 frases de tensao. 1 escolha.' : 'CONFLICT: CONTINUE THE STORY. The person uses the solution and hits real resistance. 2 tension sentences. 1 choice.';
      else guide = lang==='pt' ? 'VIRADA: CONTINUE A HISTORIA. A escolha teve consequencias. Algo muda. 2 frases de reviravolta. 1 decisao final.' : 'TWIST: CONTINUE THE STORY. The choice had consequences. Something changes. 2 reversal sentences. 1 final decision.';
    } else {
      if (isFinal) guide = lang==='pt' ? 'DESFECHO: 2 frases mostrando o impacto real na vida do protagonista. 1 frase de veredicto equilibrado.' : 'OUTCOME: 2 sentences showing real impact. 1 balanced verdict sentence.';
      else if (chapNum===0) guide = lang==='pt' ? 'ABERTURA: Solucao JA EXISTE. 1 personagem com nome real descobre e usa pela primeira vez. 2 frases. 1 decisao.' : 'OPENING: Solution ALREADY EXISTS. 1 character with real name discovers and uses it. 2 sentences. 1 decision.';
      else if (chapNum===1) guide = lang==='pt' ? 'CONFLITO: CONTINUE A HISTORIA. O protagonista usa a solucao e encontra obstaculo real. 2 frases. 1 escolha.' : 'CONFLICT: CONTINUE THE STORY. Protagonist hits a real obstacle. 2 sentences. 1 choice.';
      else guide = lang==='pt' ? 'VIRADA: CONTINUE A HISTORIA. A escolha teve consequencias. Algo muda. 2 frases. 1 decisao final.' : 'TWIST: CONTINUE THE STORY. Choice had consequences. Something changes. 2 sentences. 1 final decision.';
    }
    var p = (lang==='pt'
      ? 'Narre capitulo ' + (chapNum+1) + '/4. A solucao JA EXISTE no mundo. Mostre na vida real com sucessos e dificuldades.\n\nSolucao: '
      : 'Narrate chapter ' + (chapNum+1) + '/4. Solution ALREADY EXISTS. Show in real life with successes and difficulties.\n\nSolution: ')
      + state.outcome + '\n' + storyCtx + '\n' + histCtx + '\n\n' + guide
      + (lang==='pt'
        ? '\n\nMax 60 palavras na narrativa. Responda SEMPRE em portugues.\nJSON sem backticks:\n{"narrative":"2 frases","isFinal":' + isFS + ',"verdict":' + (isFinal?'"1 frase de veredicto"':'null') + ',"choices":' + choicesStr + '}'
        : '\n\nMax 60 words in narrative.\nJSON no backticks:\n{"narrative":"2 sentences","isFinal":' + isFS + ',"verdict":' + (isFinal?'"1 verdict sentence"':'null') + ',"choices":' + choicesStr + '}');

    var sc = await api(p, 250);
    window._ch = sc.choices || [];
    story.push(sc.narrative);

    var pars = sc.narrative.split('\n\n').filter(function(x){ return x.trim(); }).map(function(x){ return '<p>' + x.trim() + '</p>'; }).join('');
    var vb = sc.verdict ? '<div style="background:rgba(180,79,255,0.08);border:1px solid rgba(180,79,255,0.2);padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--text);font-style:italic;line-height:1.6">&#9672; ' + sc.verdict + '</div>' : '';
    var updDots = chaps.map(function(c, i) {
      var cls = i < chapNum ? 'done' : (i === chapNum ? 'active' : '');
      return '<div class="chap-dot ' + cls + '"></div>';
    }).join('');
    var ch = (!isFinal && sc.choices) ? '<div class="choices">' + sc.choices.map(function(c, ci) {
      return '<button class="choice" onclick="choose(' + ci + ')"><span class="cletter">' + c.letter + '</span><span>' + c.text + '</span></button>';
    }).join('') + '</div>' : '';
    var nb = isFinal ? '<div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">'
      + '<button class="btn btn-next" onclick="phase=&apos;verdict&apos;;render()">&gt; ' + tx.seeAnalysis + '</button>'
      + '<button class="btn btn-ghost" onclick="replayRPG()">&#8635; ' + tx.replay + '</button>'
      + '</div>' : '';

    a.innerHTML = '<div class="card"><div class="card-body">'
      + '<div class="chap-strip"><div class="chap-dots">' + updDots + '</div><div class="chap-label">' + chaps[Math.min(chapNum,3)] + '</div></div>'
      + pills + '<div class="rpg-scene">' + pars + '</div>' + vb + ch + nb + '</div></div>';
  } catch(e) {
    errScreen(a, 'ERRO CAP. ' + (chapNum+1) + '.', function(){ showRPG(a); }, function(){ phase='outcome'; render(); });
  }
}

function choose(idx) {
  var c = window._ch[idx];
  if (c) hist.push(c.text);
  chapNum++;
  showRPG(document.getElementById('app'));
}

        : 'Evaluate the viability of this solution. JSON no backticks. In the similarProjects field, only include entries if there are directly comparable products or services — otherwise return empty array.\n\nProblem: ' + state.spark + '\nNeed: ' + state.objective + '\nSolution: ' + state.outcome + '\nContext: ' + marketData + '\n\nCriteria (avoid 60-75):\n- 85-100: clear solution, applicable, resolves the problem\n- 65-84: good solution with manageable obstacles\n- 45-64: partial solution or with limitations\n- 0-44: does not resolve or impractical\n\n{"score":0-100,"scoreLabel":"3-5 words","marketInsight":"1-2 sentences about context","similarProjects":[{"name":"product name","description":"what it does and how it relates"}],"strengths":["s1","s2"],"risks":[{"risk":"limitation","mitigation":"how to overcome"}],"solutions":["variation 1","variation 2","variation 3"]}';
    } else {
      p = lang === 'pt'
        ? 'Analise o potencial desta ideia. JSON sem backticks. No campo similarProjects, inclua apenas se houver produtos ou servicos diretamente comparaveis — caso contrario retorne array vazio.\n\nSpark: ' + state.spark + '\nObjective: ' + state.objective + '\nHipotese: ' + state.outcome + '\nMercado: ' + marketData + '\n\nCriterios (evite 60-75):\n- 85-100: mercado grande e crescente, demanda comprovada\n- 65-84: mercado existe, demanda emergente\n- 45-64: mercado pequeno ou incerto\n- 0-44: mercado inexistente ou timing ruim\n\n{"score":0-100,"scoreLabel":"3-5 palavras","marketInsight":"1-2 frases com dados de mercado","similarProjects":[{"name":"nome do produto","description":"o que faz e como se relaciona"}],"strengths":["s1","s2"],"risks":[{"risk":"risco","mitigation":"mitigacao"}],"solutions":["caminho 1","caminho 2","caminho 3"]}'

    // Convert categoria to score to avoid model anchoring on 72
    var catMap = {
      'EXCEPCIONAL': function(){ return 85 + Math.floor(Math.random()*15); },
      'EXCEPTIONAL': function(){ return 85 + Math.floor(Math.random()*15); },
      'PROMISSORA':  function(){ return 65 + Math.floor(Math.random()*20); },

      'FRAGIL':      function(){ return 35 + Math.floor(Math.random()*25); },
      'FRAGILE':     function(){ return 35 + Math.floor(Math.random()*25); },
      'INVIAVEL':    function(){ return 5  + Math.floor(Math.random()*30); },
      'UNVIABLE':    function(){ return 5  + Math.floor(Math.random()*30); }
    };
    var cat = (an.categoria || '').toUpperCase().trim();
    if (catMap[cat]) {
      an.score = catMap[cat]();
    } else if (!an.score || an.score === 72) {
      an.score = 55 + Math.floor(Math.random()*30);
    }
    state.analysis = an;
    var funded = an.score >= 65;
    try { simCount++; localStorage.setItem('simly_n', simCount); } catch(e) {}

    var pre = funded ? tx.fundedPre : tx.drawingPre;
    var word = funded ? tx.fundedWord : tx.drawingWord;

// ── API ──
async function api(prompt, maxTokens) {
  var res = await fetch('/.netlify/functions/ai', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:maxTokens, messages:[{role:'user',content:prompt}]})
  });
  var d = await res.json();
  if (!d.content || !d.content[0]) throw new Error('empty');
  var blocks = d.content.filter(function(b){ return b.type==='text'; });
  var txt = blocks.length ? blocks[blocks.length-1].text : d.content[0].text;
  return JSON.parse(txt.replace(/```json|```/g,'').trim());
}

async function apiSearch(prompt, maxTokens) {
  var res = await fetch('/.netlify/functions/ai-search', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:maxTokens, messages:[{role:'user',content:prompt}]})
  });
  var d = await res.json();
  if (!d.content || !d.content[0]) throw new Error('empty');
  var blocks = d.content.filter(function(b){ return b.type==='text'; });
  if (!blocks.length) throw new Error('no text');
  return blocks[blocks.length-1].text.trim();
}

// ── PAYWALL ──
var STRIPE_LINK = 'https://buy.stripe.com/dRm00c3Sw2HUc2u9CKabK00';
var SIMS_PER_PURCHASE = 3;
window._paid = true; // Paywall temporarily disabled

function _getCredits() {
  try { return parseInt(localStorage.getItem('simly_credits') || '0'); } catch(e) { return 0; }
}
function _setCredits(n) {
  try { localStorage.setItem('simly_credits', String(n)); } catch(e) {}
}
function _useCredit() {
  var c = _getCredits();
  if (c > 0) { _setCredits(c - 1); return true; }
  return false;
}

try {
  var _params = new URLSearchParams(window.location.search);
  if (_params.get('paid') === '1') {
    _setCredits(SIMS_PER_PURCHASE);
    // Restore saved state from before payment
    var _saved = sessionStorage.getItem('simly_state');
    if (_saved) {
      var _s = JSON.parse(_saved);
      if (_s && _s.outcome) {
        state = _s;
        phase = 'dashboard';
        window._paid = true;
        _useCredit();
      }
    }
    // Clean URL
    try { history.replaceState(null, '', window.location.pathname); } catch(e) {}
  }
  if (_params.get('dev') === '1') window._paid = true;
} catch(e) {}

function _checkCredits() {
  if (window._paid) return true;
  var c = _getCredits();
  if (c > 0) { _useCredit(); window._paid = true; return true; }
  return false;
}
// Reset _paid flag when starting a new simulation
function _resetPaid() {
  window._paid = false;
}

function openPaywall() {
  try { sessionStorage.setItem('simly_state', JSON.stringify(state)); } catch(e) {}
  document.getElementById('paywallOverlay').classList.add('show');
}
function closePaywall() {
  document.getElementById('paywallOverlay').classList.remove('show');
}
function goToPayment() {
  try { sessionStorage.setItem('simly_state', JSON.stringify(state)); } catch(e) {}
  window.location.href = STRIPE_LINK;
}

render();
_showAuth();

// ── PWA INSTALL BANNER ──
var _deferredPrompt = null;
var _bannerDismissed = false;
try { _bannerDismissed = !!localStorage.getItem('simly_installed'); } catch(e) {}

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _deferredPrompt = e;
  if (!_bannerDismissed) {
    var banner = document.getElementById('installBanner');
    if (banner) banner.classList.add('show');
  }
});

window.addEventListener('appinstalled', function() {
  var banner = document.getElementById('installBanner');
  if (banner) banner.classList.remove('show');
  try { localStorage.setItem('simly_installed', '1'); } catch(e) {}
  _deferredPrompt = null;
});

document.getElementById('installBtn').addEventListener('click', function() {
  if (_deferredPrompt) {
    _deferredPrompt.prompt();
    _deferredPrompt.userChoice.then(function() {
      _deferredPrompt = null;
      var banner = document.getElementById('installBanner');
      if (banner) banner.classList.remove('show');
    });
  }
});

document.getElementById('installClose').addEventListener('click', function() {
  var banner = document.getElementById('installBanner');
  if (banner) banner.classList.remove('show');
  try { localStorage.setItem('simly_installed', '1'); } catch(e) {}
});
</script>
